# Single-container deploy: the Bun WS server also serves the SvelteKit
# static bundle on the same port. Net mode (Join/Create Room) + LAN mode
# both work — Net mode WS connections land on the same origin.
#
# Override via .env (PORT=8080 docker compose up) or by editing the env
# block below.
services:
  avalon:
    build:
      context: .
      dockerfile: Dockerfile
    image: avalon-remaster:local
    container_name: avalon
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # PORT inside the container — must match the EXPOSE 3000 in Dockerfile.
      PORT: "3000"
      # The Hono /health + /rooms routes and the WS upgrade paths work without
      # any other config. Future: NODE_ENV, log level, etc.
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
